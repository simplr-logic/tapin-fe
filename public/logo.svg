<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260">
  <!-- Orange arc: 7→11 o'clock (left side) -->
  <path d="M 67.5 151.3 A 65 65 0 0 1 67.5 38.7"
        fill="none" stroke="#F5A623" stroke-width="13" stroke-linecap="round"/>
  <!-- Green arc: 12→4 o'clock (top-right) -->
  <path d="M 100 30 A 65 65 0 0 1 156.3 127.5"
        fill="none" stroke="#7AB55C" stroke-width="13" stroke-linecap="round"/>
  <!-- Blue arc: 5→7 o'clock (bottom smile) -->
  <path d="M 132.5 151.3 A 65 65 0 0 1 67.5 151.3"
        fill="none" stroke="#4A90D9" stroke-width="13" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="100" y1="95" x2="100" y2="37" stroke="#555" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="95" x2="150" y2="95" stroke="#555" stroke-width="9" stroke-linecap="round"/>
  <!-- klong text -->
  <text x="100" y="220" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="42" fill="#555">klong</text>
</svg>
